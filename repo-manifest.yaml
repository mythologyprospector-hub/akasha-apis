repo:
  name: akasha-apis
  ecosystem: akasha
  version: 0.2.0
  status: active

engine:
  family: source
  class: source_engine
  role: external_resource_mapping

identity:
  role: engine
  layer: integration
  description: >
    Adapter and normalization layer for external APIs used by the Akasha constellation.
    Responsible for connecting to outside data sources and converting them into
    consistent internal forms for downstream engines.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - external_api_endpoints
    - provider_credentials
    - source_queries
  produces:
    - normalized_source_payloads
    - provider_responses
    - adapter_outputs

capabilities:
  - api_adapter_management
  - source_normalization
  - provider_query_execution
  - response_translation

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-grand-atlas

# ---- Canonical sections added by akasha-canon ----
type: organ

family: discovery

role: apis

